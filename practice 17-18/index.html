<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4285f4">
    <link rel="apple-touch-icon" href="/icons/favicon-152x152.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Заметки с WebSocket и Push</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/ico">
</head>
<body>
    <header>
        <div class="container" style="padding-top: 20px;">
            <h1 class="is-center">📝 Заметки с <span class="no-break">WebSocket + Push</span></h1>
            <nav class="tabs is-center">
                <button id="home-btn" class="tab active col-6">🏠 Главная</button>
                <button id="about-btn" class="tab col-6">ℹ️ О приложении</button>
            </nav>
        </div>
    </header>

    <main id="app-content" class="container" style="margin-top: 2rem;">
        <div class="is-center">Загрузка...</div>
    </main>

    <footer class="is-center" style="margin: 2rem 0; padding: 1rem;">
        <button id="enable-push" class="button success">🔔 Включить уведомления</button>
        <button id="disable-push" class="button error" style="display:none;">🔕 Отключить уведомления</button>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
