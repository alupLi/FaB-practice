services:
  backend1:
    build: ./backend
    container_name: backend1
    environment:
      - PORT=3000
      - SERVER_ID=backend-1
    networks:
      - app-network
    restart: unless-stopped

  backend2:
    build: ./backend
    container_name: backend2
    environment:
      - PORT=3000
      - SERVER_ID=backend-2
    networks:
      - app-network
    restart: unless-stopped

  backend3:
    build: ./backend
    container_name: backend3
    environment:
      - PORT=3000
      - SERVER_ID=backend-3-backup
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - backend1
      - backend2
      - backend3
    restart: unless-stopped

networks:
  app-network:
    driver: bridge